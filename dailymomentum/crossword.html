.crossword-wrap{display:flex;gap:2rem;align-items:flex-start;flex-wrap:wrap;justify-content:center;width:100%}
.grid-area{display:flex;flex-direction:column;align-items:center}
.cw-grid{display:inline-grid;grid-template-columns:repeat(5,44px);grid-template-rows:repeat(5,44px);gap:0;border:2px solid rgba(139,168,136,0.4);border-radius:4px;overflow:hidden;margin-bottom:1rem}
.cw-cell{width:44px;height:44px;background:var(--bg);position:relative;box-sizing:border-box;border-right:1px solid rgba(232,228,220,0.08);border-bottom:1px solid rgba(232,228,220,0.08);cursor:pointer;user-select:none}
.cw-cell:nth-child(5n){border-right:none}
.cw-cell.black{background:#000;cursor:default;border-color:#000}
.cw-cell.thick-r{border-right:2px solid rgba(139,168,136,0.3)}
.cw-cell.thick-b{border-bottom:2px solid rgba(139,168,136,0.3)}
.cw-cell.selected{background:rgba(139,168,136,0.28)}
.cw-cell.hilite{background:rgba(139,168,136,0.1)}
.cw-letter{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-family:'Jost',sans-serif;font-size:1.05rem;font-weight:400;color:var(--ink);text-transform:uppercase;pointer-events:none}
.cw-num{position:absolute;top:2px;left:3px;font-size:0.42rem;color:var(--accent);font-family:'Jost',sans-serif;line-height:1;pointer-events:none;z-index:1}
.clues-area{min-width:200px;max-width:240px}
.clue-section{margin-bottom:1.2rem}
.clue-dir{font-size:0.58rem;letter-spacing:0.25em;text-transform:uppercase;color:var(--accent);margin-bottom:0.6rem;font-family:'Jost',sans-serif}
.clue-item{font-size:0.75rem;font-weight:300;color:var(--muted);line-height:1.5;margin-bottom:0.3rem;cursor:pointer;padding:0.15rem 0.4rem;border-radius:3px;transition:color 0.15s,background 0.15s;font-family:'Jost',sans-serif}
.clue-item:hover{color:var(--ink)}
.clue-item.active{color:var(--accent);background:rgba(139,168,136,0.08)}
.cw-actions{display:flex;gap:0.6rem}
.action-btn{background:none;border:1px solid var(--rule);color:var(--muted);font-family:'Jost',sans-serif;font-size:0.58rem;letter-spacing:0.15em;text-transform:uppercase;padding:0.4rem 0.9rem;border-radius:2rem;cursor:pointer;transition:all 0.2s}
.action-btn:hover{border-color:var(--accent-dim);color:var(--ink)}
.status-msg{font-size:0.62rem;letter-spacing:0.2em;text-transform:uppercase;color:var(--muted);margin-top:0.6rem;min-height:1.2em;text-align:center;font-family:'Jost',sans-serif}
.status-msg.win{color:var(--accent)}
#cwCap{position:fixed;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0}
</style>

"TOUCH":"Make contact","TOUGH":"Strong or difficult","TOWEL":"Cloth for drying","TOWER":"Tall narrow structure",
"TRACE":"Follow a path or faint mark","TRACK":"Path or monitor progress","TRADE":"Exchange goods",
"TRAIL":"Path through nature","TRAIN":"Teach or rail vehicle","TRAIT":"Distinguishing quality",
"TRASH":"Waste material","TRAWL":"Search widely","TREAD":"Walk on or step pattern","TREAT":"Something enjoyable",
"TREND":"General direction of change","TRIAL":"Test or legal hearing","TRICK":"Deceptive act",
"TROUT":"Freshwater fish","TROVE":"Valuable collection","TRUCE":"Agreement to stop fighting",
"TRULY":"In a genuine way","TRUNK":"Tree's main stem or elephant's nose","TRUST":"Firm belief in reliability",
"TRUTH":"What is real","TULIP":"Cup-shaped flower","TWICE":"Two times","ULTRA":"Extreme","UNCUT":"Not trimmed",
"UNDUE":"Excessive","UNIFY":"Bring together","UNION":"Group joined together","UNITE":"Join as one",
"UNITY":"State of being united","UNTIL":"Up to the time of","UPPER":"Higher in position",
"UPSET":"Make unhappy or unexpected defeat","URBAN":"Relating to a city","UTTER":"Speak or absolute",
"VAGUE":"Not clearly defined","VALID":"Acceptable or sound","VALOR":"Courage in battle",
"VALVE":"Device controlling flow","VAPOR":"Gas from heated liquid","VENOM":"Poison from an animal",
"VIGOR":"Physical strength and energy","VIRAL":"Spreading rapidly","VISTA":"Pleasing view",
"VIVID":"Intensely bright or lively","VOCAL":"Relating to the voice","VOUCH":"Give assurance",
"VOWEL":"A E I O or U","WACKY":"Funny in an odd way","WALTZ":"Three-beat dance","WASTE":"Use carelessly or rubbish",
"WATCH":"Observe or wrist timepiece","WATER":"H2O","WEARY":"Tired and exhausted","WEDGE":"V-shaped object",
"WEIRD":"Strange and unusual","WHALE":"Largest ocean mammal","WHEAT":"Grain used for bread",
"WHILE":"During the time that","WHINE":"High-pitched complaint","WHIRL":"Spin rapidly",
"WHISK":"Beat quickly or kitchen tool","WHITE":"Color of snow","WHOLE":"Complete or not divided",
"WIELD":"Hold and use a weapon","WINCE":"Flinch in pain","WINDY":"With strong breeze",
"WITCH":"Person said to practice magic","WITTY":"Cleverly humorous","WRATH":"Intense anger",
"WRING":"Twist forcefully","WRONG":"Not correct","YEARN":"Long for deeply","YIELD":"Produce or give way",
"YOUNG":"Not old","ZESTY":"Full of flavor and energy","ADAGE":"Traditional saying",
"EVADE":"Escape from","ENSUE":"Follow as a result","ENACT":"Bring into effect",
"TRIAD":"Group of three","SHAWL":"Wrap worn over shoulders",
};

const WORDS = Object.keys(CLUES);

// ── seeded RNG ───────────────────────────────────────────────────────────────
function SeededRNG(seed){
  let s=seed|0;
  return function(){s=Math.imul(1664525,s)+1013904223|0;return(s>>>0)/4294967296};
}

// ── position index ────────────────────────────────────────────────────────────
const BY_POS=(()=>{
  const idx=Array.from({length:5},()=>({}));
  for(const w of WORDS){
    for(let i=0;i<5;i++){
      const ch=w[i];
      if(!idx[i][ch])idx[i][ch]=[];
      idx[i][ch].push(w);
    }
  }
  return idx;
})();

function pick(arr,rng){return arr[Math.floor(rng()*arr.length)]}

// ── puzzle generation ─────────────────────────────────────────────────────────
// Grid pattern (X=black):
//  A B C D E   row0=across1
//  F X G X H   F,G,H = down connectors rows 1,3
//  I J K L M   row2=across2
//  N X O X P
//  Q R S T U   row4=across3
// Downs: col0=A,F,I,N,Q  col2=C,G,K,O,S  col4=E,H,M,P,U
// Constraints: A1[0]=D1[0], A1[2]=D2[0], A1[4]=D3[0]
//              A2[0]=D1[2], A2[2]=D2[2], A2[4]=D3[2]
//              A3[0]=D1[4], A3[2]=D2[4], A3[4]=D3[4]

function generatePuzzle(seed){
  const rng=SeededRNG(seed);
  for(let attempt=0;attempt<8000;attempt++){
    const a1=pick(WORDS,rng);
    const d1c=BY_POS[0][a1[0]],d2c=BY_POS[0][a1[2]],d3c=BY_POS[0][a1[4]];
    if(!d1c||!d2c||!d3c)continue;
    const d1=pick(d1c,rng),d2=pick(d2c,rng),d3=pick(d3c,rng);
    const a2c=(BY_POS[0][d1[2]]||[]).filter(w=>w[2]===d2[2]&&w[4]===d3[2]);
    if(!a2c.length)continue;
    const a2=pick(a2c,rng);
    const a3c=(BY_POS[0][d1[4]]||[]).filter(w=>w[2]===d2[4]&&w[4]===d3[4]);
    if(!a3c.length)continue;
    const a3=pick(a3c,rng);
    if(new Set([a1,a2,a3,d1,d2,d3]).size===6)
      return {a1,a2,a3,d1,d2,d3};
  }
  return null;
}

// ── build 5x5 grid array from words ──────────────────────────────────────────
// Returns 5x5 array; '#' = black
function wordsToGrid({a1,a2,a3,d1,d2,d3}){
  const g=Array.from({length:5},()=>Array(5).fill('#'));
  for(let c=0;c<5;c++){g[0][c]=a1[c];g[2][c]=a2[c];g[4][c]=a3[c];}
  for(let r=0;r<5;r++){g[r][0]=d1[r];g[r][2]=d2[r];g[r][4]=d3[r];}
  return g;
}

// ── date helpers ──────────────────────────────────────────────────────────────
function getDayOfYear(date){
  return Math.floor((date-new Date(date.getFullYear(),0,0))/86400000);
}
function formatDate(date){
  return date.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

// ── state ─────────────────────────────────────────────────────────────────────
const today=new Date();today.setHours(0,0,0,0);
let offset=0,puzz=null,grid=null,user=null,sel=null,dir='across';

// ── cell element helper ───────────────────────────────────────────────────────
function cellEl(r,c){return document.querySelector(`.cw-cell[data-r="${r}"][data-c="${c}"]`)}

// ── highlights (no grid rebuild) ──────────────────────────────────────────────
function highlight(){
  document.querySelectorAll('.cw-cell').forEach(el=>el.classList.remove('selected','hilite'));
  if(!sel)return;
  const[sr,sc]=sel;
  wordCells(sr,sc,dir).forEach(([r,c])=>{
    const el=cellEl(r,c);if(el)el.classList.add('hilite');
  });
  const s=cellEl(sr,sc);if(s){s.classList.remove('hilite');s.classList.add('selected');}
  document.querySelectorAll('.clue-item').forEach(el=>el.classList.remove('active'));
  const num=wordNum(sr,sc,dir);
  if(num){const el=document.getElementById((dir==='across'?'ac':'dn')+'-'+num);if(el)el.classList.add('active');}
}

// ── word helpers ──────────────────────────────────────────────────────────────
function wordCells(r,c,d){
  const cells=[];
  if(d==='across'){
    let sc=c;while(sc>0&&grid[r][sc-1]!=='#')sc--;
    for(let cc=sc;cc<5&&grid[r][cc]!=='#';cc++)cells.push([r,cc]);
  }else{
    let sr=r;while(sr>0&&grid[sr-1][c]!=='#')sr--;
    for(let rr=sr;rr<5&&grid[rr][c]!=='#';rr++)cells.push([rr,c]);
  }
  return cells;
}

function wordNum(r,c,d){
  const cells=wordCells(r,c,d);if(!cells.length)return null;
  const[wr,wc]=cells[0];
  const src=d==='across'?puzz.acrossNums:puzz.downNums;
  for(const[n,pos]of Object.entries(src))if(pos[0]===wr&&pos[1]===wc)return n;
  return null;
}

function clueNumAt(r,c){
  for(const[n,p]of Object.entries(puzz.acrossNums))if(p[0]===r&&p[1]===c)return n;
  for(const[n,p]of Object.entries(puzz.downNums))if(p[0]===r&&p[1]===c)return n;
  return null;
}

// ── update single letter span ─────────────────────────────────────────────────
function setLetter(r,c){
  const el=cellEl(r,c);if(!el)return;
  const sp=el.querySelector('.cw-letter');if(sp)sp.textContent=user[r][c];
}

// ── build grid DOM (once per puzzle) ─────────────────────────────────────────
function buildGrid(){
  const g=document.getElementById('cwGrid');g.innerHTML='';
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    const cell=document.createElement('div');
    cell.className='cw-cell';cell.dataset.r=r;cell.dataset.c=c;
    if(grid[r][c]==='#'){cell.classList.add('black');g.appendChild(cell);continue;}
    if(c===2)cell.classList.add('thick-r');
    if(r===2)cell.classList.add('thick-b');
    const num=clueNumAt(r,c);
    if(num){const n=document.createElement('span');n.className='cw-num';n.textContent=num;cell.appendChild(n);}
    const lsp=document.createElement('span');lsp.className='cw-letter';lsp.textContent=user[r][c];cell.appendChild(lsp);
    cell.addEventListener('mousedown',e=>{e.preventDefault();clickCell(r,c);});
    g.appendChild(cell);
  }
}

function clickCell(r,c){
  if(sel&&sel[0]===r&&sel[1]===c){
    const nd=dir==='across'?'down':'across';
    if(wordCells(r,c,nd).length>=2)dir=nd;
  }else{
    sel=[r,c];
    if(wordCells(r,c,dir).length<2)dir=dir==='across'?'down':'across';
  }
  highlight();focusCap();
}

function focusCap(){const c=document.getElementById('cwCap');c.value='';c.focus();}

// ── clue panel ────────────────────────────────────────────────────────────────
function renderClues(){
  const ac=document.getElementById('acrossClues'),dn=document.getElementById('downClues');
  ac.innerHTML='';dn.innerHTML='';
  for(const[n,clue]of Object.entries(puzz.across)){
    const d=document.createElement('div');d.className='clue-item';d.id='ac-'+n;
    d.textContent=n+'. '+clue;
    const pos=puzz.acrossNums[n];
    d.addEventListener('mousedown',e=>{e.preventDefault();sel=[pos[0],pos[1]];dir='across';highlight();focusCap();});
    ac.appendChild(d);
  }
  for(const[n,clue]of Object.entries(puzz.down)){
    const d=document.createElement('div');d.className='clue-item';d.id='dn-'+n;
    d.textContent=n+'. '+clue;
    const pos=puzz.downNums[n];
    d.addEventListener('mousedown',e=>{e.preventDefault();sel=[pos[0],pos[1]];dir='down';highlight();focusCap();});
    dn.appendChild(d);
  }
}

// ── keyboard ──────────────────────────────────────────────────────────────────
document.getElementById('cwCap').addEventListener('keydown',function(e){
  if(!sel)return;
  const[r,c]=sel;
  if(e.key==='Backspace'){
    e.preventDefault();
    if(user[r][c]){user[r][c]='';setLetter(r,c);}else movePrev();
    return;
  }
  if(e.key==='Delete'){e.preventDefault();user[r][c]='';setLetter(r,c);return;}
  if(e.key==='ArrowRight'){e.preventDefault();dir='across';moveNext();return;}
  if(e.key==='ArrowLeft'){e.preventDefault();dir='across';movePrev();return;}
  if(e.key==='ArrowDown'){e.preventDefault();dir='down';moveNext();return;}
  if(e.key==='ArrowUp'){e.preventDefault();dir='down';movePrev();return;}
  if(e.key==='Escape'){sel=null;highlight();return;}
  if(e.key==='Tab'){e.preventDefault();return;}
  if(e.key.length===1&&/[a-zA-Z]/.test(e.key)){
    e.preventDefault();
    user[r][c]=e.key.toUpperCase();
    setLetter(r,c);moveNext();checkWin();
  }
});

document.getElementById('cwCap').addEventListener('blur',function(){
  if(sel)setTimeout(()=>{if(sel)document.getElementById('cwCap').focus();},10);
});

function moveNext(){
  if(!sel)return;const[r,c]=sel;
  const cells=wordCells(r,c,dir);
  const idx=cells.findIndex(([cr,cc])=>cr===r&&cc===c);
  if(idx<cells.length-1){sel=cells[idx+1];highlight();}
}
function movePrev(){
  if(!sel)return;const[r,c]=sel;
  const cells=wordCells(r,c,dir);
  const idx=cells.findIndex(([cr,cc])=>cr===r&&cc===c);
  if(idx>0){sel=cells[idx-1];highlight();}
}

// ── load puzzle ───────────────────────────────────────────────────────────────
function loadPuzzle(){
  const d=new Date(today);d.setDate(d.getDate()+offset);
  const seed=getDayOfYear(d)+(d.getFullYear()-2024)*1000;
  const words=generatePuzzle(seed);
  if(!words){console.error('No puzzle for seed',seed);return;}
  grid=wordsToGrid(words);
  user=grid.map(row=>row.map(ch=>ch==='#'?'#':''));
  // clue numbering: 1=across1/down1, 2=down2, 3=across2/down3, 4=down4... 
  // For this grid: acrossNums 1=[0,0] 3=[2,0] 5=[4,0]   downNums 1=[0,0] 2=[0,2] 3=[0,4]
  puzz={
    across:{
      1:CLUES[words.a1],
      3:CLUES[words.a2],
      5:CLUES[words.a3]
    },
    down:{
      1:CLUES[words.d1],
      2:CLUES[words.d2],
      3:CLUES[words.d3]
    },
    acrossNums:{1:[0,0],3:[2,0],5:[4,0]},
    downNums:{1:[0,0],2:[0,2],3:[0,4]}
  };
  sel=null;dir='across';
  buildGrid();renderClues();highlight();
  document.getElementById('statusMsg').textContent='';
  document.getElementById('statusMsg').className='status-msg';
}

// ── actions ───────────────────────────────────────────────────────────────────
function checkCW(){
  let errors=0,filled=0;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    if(grid[r][c]==='#')continue;
    if(user[r][c]){filled++;if(user[r][c]!==grid[r][c])errors++;}
  }
  const msg=document.getElementById('statusMsg');
  if(!filled){msg.textContent='Fill in some letters first.';return;}
  msg.className=errors?'status-msg':'status-msg win';
  msg.textContent=errors?errors+' incorrect letter'+(errors>1?'s':''):'. All filled letters are correct.';
}

function resetCW(){
  user=grid.map(row=>row.map(ch=>ch==='#'?'#':''));
  sel=null;
  for(let r=0;r<5;r++)for(let c=0;c<5;c++)setLetter(r,c);
  highlight();
  document.getElementById('statusMsg').textContent='';
}

function revealCW(){
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    if(grid[r][c]!=='#'){user[r][c]=grid[r][c];setLetter(r,c);}
  }
  document.getElementById('statusMsg').textContent='Puzzle revealed.';
}

function checkWin(){
  for(let r=0;r<5;r++)for(let c=0;c<5;c++){
    if(grid[r][c]==='#')continue;
    if(user[r][c]!==grid[r][c])return;
  }
  document.getElementById('statusMsg').textContent='Solved. Well done.';
  document.getElementById('statusMsg').className='status-msg win';
}

function changeDay(d){
  offset+=d;
  const dt=new Date(today);dt.setDate(dt.getDate()+offset);
  document.getElementById('dateLabel').textContent=formatDate(dt);
  document.getElementById('prevBtn').disabled=offset<=-30;
  document.getElementById('nextBtn').disabled=offset>=0;
  loadPuzzle();
}

// ── init ──────────────────────────────────────────────────────────────────────
document.getElementById('dateLabel').textContent=formatDate(today);
document.getElementById('prevBtn').disabled=false;
document.getElementById('nextBtn').disabled=true;
loadPuzzle();
</script>
