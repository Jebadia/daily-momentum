<style>
.crossword-wrap { display:flex; gap:2rem; align-items:flex-start; flex-wrap:wrap; justify-content:center; width:100%; }
.grid-area { display:flex; flex-direction:column; align-items:center; }
.cw-grid { display:inline-grid; grid-template-columns:repeat(5,42px); grid-template-rows:repeat(5,42px); gap:0; border:2px solid rgba(139,168,136,0.4); border-radius:4px; overflow:hidden; margin-bottom:1rem; }
.cw-cell { width:42px; height:42px; background:var(--bg); position:relative; box-sizing:border-box; border-right:1px solid rgba(232,228,220,0.08); border-bottom:1px solid rgba(232,228,220,0.08); cursor:pointer; user-select:none; }
.cw-cell:nth-child(5n) { border-right:none; }
.cw-cell.black { background:#000; cursor:default; border-color:#000; }
.cw-cell.thick-right { border-right:2px solid rgba(139,168,136,0.35); }
.cw-cell.thick-bottom { border-bottom:2px solid rgba(139,168,136,0.35); }
.cw-cell.selected { background:rgba(139,168,136,0.28); }
.cw-cell.active-word { background:rgba(139,168,136,0.1); }
.cw-letter { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-family:'Jost',sans-serif; font-size:1rem; font-weight:400; color:var(--ink); text-transform:uppercase; pointer-events:none; }
.cw-num { position:absolute; top:2px; left:3px; font-size:0.42rem; color:var(--accent); font-family:'Jost',sans-serif; line-height:1; pointer-events:none; z-index:1; }
.clues-area { min-width:200px; max-width:240px; }
.clue-section { margin-bottom:1.2rem; }
.clue-dir { font-size:0.58rem; letter-spacing:0.25em; text-transform:uppercase; color:var(--accent); margin-bottom:0.6rem; font-family:'Jost',sans-serif; }
.clue-item { font-size:0.75rem; font-weight:300; color:var(--muted); line-height:1.5; margin-bottom:0.3rem; cursor:pointer; padding:0.15rem 0.4rem; border-radius:3px; transition:color 0.15s, background 0.15s; font-family:'Jost',sans-serif; }
.clue-item:hover { color:var(--ink); }
.clue-item.active { color:var(--accent); background:rgba(139,168,136,0.08); }
.cw-actions { display:flex; gap:0.6rem; }
.action-btn { background:none; border:1px solid var(--rule); color:var(--muted); font-family:'Jost',sans-serif; font-size:0.58rem; letter-spacing:0.15em; text-transform:uppercase; padding:0.4rem 0.9rem; border-radius:2rem; cursor:pointer; transition:all 0.2s; }
.action-btn:hover { border-color:var(--accent-dim); color:var(--ink); }
.status-msg { font-size:0.62rem; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); margin-top:0.6rem; min-height:1.2em; text-align:center; font-family:'Jost',sans-serif; }
.status-msg.win { color:var(--accent); }
/* hidden input to capture keyboard */
#cwCapture { position:fixed; opacity:0; pointer-events:none; width:1px; height:1px; top:0; left:0; }

<script>

  {

    across:{1:"Cosmic cause and effect",3:"Period of a ruler's power",5:"To one side"},
    down:{1:"Snap or crackle",2:"Relating to the arm",3:"Opposite of she",4:"Not odd"},
    acrossNums:{1:[0,0],3:[2,0],5:[4,0]},
    downNums:{1:[0,0],2:[0,2],3:[2,2],4:[0,4]}
  }
];

function getDayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  return Math.floor((date - start) / 86400000);
}
function formatDate(date) {
  return date.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'});
}

const today = new Date(); today.setHours(0,0,0,0);
let offset = 0;
let puzz, userGrid, sel = null, dir = 'across';

// --- pure DOM update helpers (no grid rebuild) ---

function cellEl(r, c) {
  return document.querySelector(`.cw-cell[data-r="${r}"][data-c="${c}"]`);
}

function updateHighlights() {
  document.querySelectorAll('.cw-cell').forEach(el => {
    el.classList.remove('selected','active-word');
  });
  if (!sel) return;
  const [sr, sc] = sel;
  // highlight word cells
  getWordCells(sr, sc, dir).forEach(([r,c]) => {
    const el = cellEl(r,c);
    if(el) el.classList.add('active-word');
  });
  // highlight selected cell on top
  const selEl = cellEl(sr, sc);
  if(selEl) { selEl.classList.remove('active-word'); selEl.classList.add('selected'); }
  // highlight active clue
  document.querySelectorAll('.clue-item').forEach(el => el.classList.remove('active'));
  const wordNum = getWordNum(sr, sc, dir);
  if(wordNum) {
    const id = (dir==='across'?'ac-':'dn-') + wordNum;
    const el = document.getElementById(id);
    if(el) el.classList.add('active');
  }
}

function updateCellLetter(r, c) {
  const el = cellEl(r,c);
  if(!el) return;
  const span = el.querySelector('.cw-letter');
  if(span) span.textContent = userGrid[r][c];
}

// --- word helpers ---

function getWordCells(r, c, d) {
  const cells = [];
  if(d === 'across') {
    // find start of this across word
    let sc = c;
    while(sc > 0 && puzz.grid[r][sc-1] !== '#') sc--;
    for(let cc = sc; cc < 5 && puzz.grid[r][cc] !== '#'; cc++) cells.push([r,cc]);
  } else {
    let sr = r;
    while(sr > 0 && puzz.grid[sr-1][c] !== '#') sr--;
    for(let rr = sr; rr < 5 && puzz.grid[rr][c] !== '#'; rr++) cells.push([rr,c]);
  }
  return cells;
}

function getWordNum(r, c, d) {
  const cells = getWordCells(r, c, d);
  if(!cells.length) return null;
  const [wr, wc] = cells[0];
  const src = d==='across' ? puzz.acrossNums : puzz.downNums;
  for(const [n, pos] of Object.entries(src)) {
    if(pos[0]===wr && pos[1]===wc) return n;
  }
  return null;
}

function getClueNum(r, c) {
  for(const [n,pos] of Object.entries(puzz.acrossNums)) { if(pos[0]===r && pos[1]===c) return n; }
  for(const [n,pos] of Object.entries(puzz.downNums)) { if(pos[0]===r && pos[1]===c) return n; }
  return null;
}

// --- grid build (called once per puzzle) ---

function buildGrid() {
  const g = document.getElementById('cwGrid');
  g.innerHTML = '';
  for(let r=0;r<5;r++) {
    for(let c=0;c<5;c++) {
      const cell = document.createElement('div');
      cell.className = 'cw-cell';
      cell.dataset.r = r;
      cell.dataset.c = c;
      if(puzz.grid[r][c] === '#') {
        cell.classList.add('black');
      } else {
        const num = getClueNum(r,c);
        if(num) {
          const n = document.createElement('span');
          n.className = 'cw-num';
          n.textContent = num;
          cell.appendChild(n);
        }
        const letter = document.createElement('span');
        letter.className = 'cw-letter';
        letter.textContent = userGrid[r][c];
        cell.appendChild(letter);
        cell.addEventListener('mousedown', (e) => {
          e.preventDefault(); // prevent blur on hidden input
          handleCellClick(r, c);
        });
      }
      // thick borders for 3x3 box separation
      if(c===2) cell.classList.add('thick-right');
      if(r===2) cell.classList.add('thick-bottom');
      g.appendChild(cell);
    }
  }
}

function handleCellClick(r, c) {
  if(sel && sel[0]===r && sel[1]===c) {
    // toggle direction if clicking same cell
    dir = dir==='across' ? 'down' : 'across';
    // if new direction has only 1 cell (black neighbors), stay on original
    if(getWordCells(r,c,dir).length < 2) dir = dir==='across'?'down':'across';
  } else {
    sel = [r, c];
    // auto-pick direction: prefer current dir if valid, else switch
    if(getWordCells(r,c,dir).length < 2) dir = dir==='across'?'down':'across';
  }
  updateHighlights();
  focusCapture();
}

function focusCapture() {
  const cap = document.getElementById('cwCapture');
  cap.value = '';
  cap.focus();
}

// --- keyboard handling on hidden input ---

document.getElementById('cwCapture').addEventListener('keydown', function(e) {
  if(!sel) return;
  const [r, c] = sel;

  if(e.key === 'Backspace') {
    e.preventDefault();
    if(userGrid[r][c]) {
      userGrid[r][c] = '';
      updateCellLetter(r,c);
    } else {
      movePrev();
    }
    return;
  }
  if(e.key === 'Delete') {
    e.preventDefault();
    userGrid[r][c] = '';
    updateCellLetter(r,c);
    return;
  }
  if(e.key === 'ArrowRight') { e.preventDefault(); dir='across'; moveNext(); return; }
  if(e.key === 'ArrowLeft')  { e.preventDefault(); dir='across'; movePrev(); return; }
  if(e.key === 'ArrowDown')  { e.preventDefault(); dir='down';   moveNext(); return; }
  if(e.key === 'ArrowUp')    { e.preventDefault(); dir='down';   movePrev(); return; }
  if(e.key === 'Tab')        { e.preventDefault(); return; }
  if(e.key === 'Escape')     { sel=null; updateHighlights(); return; }

  // letter input
  if(e.key.length === 1 && /[a-zA-Z]/.test(e.key)) {
    e.preventDefault();
    if(puzz.grid[r][c] === '#') return;
    userGrid[r][c] = e.key.toUpperCase();
    updateCellLetter(r,c);
    moveNext();
    checkWinCW();
  }
});

// keep capture focused when it blurs (unless user clicked elsewhere)
document.getElementById('cwCapture').addEventListener('blur', function() {
  if(sel) setTimeout(() => { if(sel) document.getElementById('cwCapture').focus(); }, 10);
});

function moveNext() {
  if(!sel) return;
  const [r,c] = sel;
  const cells = getWordCells(r,c,dir);
  const idx = cells.findIndex(([cr,cc])=>cr===r&&cc===c);
  if(idx < cells.length-1) {
    sel = cells[idx+1];
    updateHighlights();
  }
}

function movePrev() {
  if(!sel) return;
  const [r,c] = sel;
  const cells = getWordCells(r,c,dir);
  const idx = cells.findIndex(([cr,cc])=>cr===r&&cc===c);
  if(idx > 0) {
    sel = cells[idx-1];
    updateHighlights();
  }
}

// --- clue rendering ---

function renderClues() {
  const ac = document.getElementById('acrossClues');
  const dn = document.getElementById('downClues');
  ac.innerHTML = ''; dn.innerHTML = '';
  for(const [n, clue] of Object.entries(puzz.across)) {
    const d = document.createElement('div');
    d.className = 'clue-item'; d.id = 'ac-'+n;
    d.textContent = n+'. '+clue;
    const pos = puzz.acrossNums[n];
    d.addEventListener('mousedown', (e) => {
      e.preventDefault();
      sel = [pos[0],pos[1]]; dir='across';
      updateHighlights(); focusCapture();
    });
    ac.appendChild(d);
  }
  for(const [n, clue] of Object.entries(puzz.down)) {
    const d = document.createElement('div');
    d.className = 'clue-item'; d.id = 'dn-'+n;
    d.textContent = n+'. '+clue;
    const pos = puzz.downNums[n];
    d.addEventListener('mousedown', (e) => {
      e.preventDefault();
      sel = [pos[0],pos[1]]; dir='down';
      updateHighlights(); focusCapture();
    });
    dn.appendChild(d);
  }
}

// --- puzzle load ---

function buildCW() {
  const d = new Date(today); d.setDate(d.getDate() + offset);
  const day = getDayOfYear(d);
  puzz = puzzles[((day-1) % puzzles.length + puzzles.length) % puzzles.length];
  userGrid = puzz.grid.map(row => row.split('').map(ch => ch==='#'?'#':''));
  sel = null; dir = 'across';
  buildGrid();
  renderClues();
  updateHighlights();
  document.getElementById('statusMsg').textContent = '';
  document.getElementById('statusMsg').className = 'status-msg';
}

// --- actions ---

function checkCW() {
  let errors=0, filled=0;
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) {
    if(puzz.grid[r][c]==='#') continue;
    if(userGrid[r][c]) { filled++; if(userGrid[r][c]!==puzz.grid[r][c]) errors++; }
  }
  const msg = document.getElementById('statusMsg');
  if(!filled) { msg.textContent='Fill in some letters first.'; return; }
  msg.className = errors ? 'status-msg' : 'status-msg win';
  msg.textContent = errors ? errors+' incorrect letter'+(errors>1?'s':'')+'.': 'All filled letters are correct.';
}

function resetCW() {
  userGrid = puzz.grid.map(row => row.split('').map(ch => ch==='#'?'#':''));
  sel=null; dir='across';
  // update all letter spans
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) updateCellLetter(r,c);
  updateHighlights();
  document.getElementById('statusMsg').textContent='';
}

function revealCW() {
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) {
    if(puzz.grid[r][c]!=='#') { userGrid[r][c]=puzz.grid[r][c]; updateCellLetter(r,c); }
  }
  document.getElementById('statusMsg').textContent='Puzzle revealed.';
  document.getElementById('statusMsg').className='status-msg';
}

function checkWinCW() {
  for(let r=0;r<5;r++) for(let c=0;c<5;c++) {
    if(puzz.grid[r][c]==='#') continue;
    if(userGrid[r][c]!==puzz.grid[r][c]) return;
  }
  document.getElementById('statusMsg').textContent='Solved. Well done.';
  document.getElementById('statusMsg').className='status-msg win';
}

function changeDay(dir2) {
  offset += dir2;
  const d = new Date(today); d.setDate(d.getDate() + offset);
  document.getElementById('dateLabel').textContent = formatDate(d);
  document.getElementById('prevBtn').disabled = offset <= -30;
  document.getElementById('nextBtn').disabled = offset >= 0;
  buildCW();
}

// --- init ---
const initD = new Date(today);
document.getElementById('dateLabel').textContent = formatDate(initD);
document.getElementById('prevBtn').disabled = false;
document.getElementById('nextBtn').disabled = true;
buildCW();
</script>
