function getDayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  return Math.floor((date - start) / 86400000);
}
function formatDate(date) {
  return date.toLocaleDateString('en-US', {weekday:'long',month:'long',day:'numeric',year:'numeric'});
}
function seededRand(seed) {
  let x = Math.sin(seed) * 10000;
  return x - Math.floor(x);
}

const today = new Date(); today.setHours(0,0,0,0);
let offset = 0;
let selectedSign = localStorage.getItem('dmSign') || 'Aries';

function buildPicker() {
  const p = document.getElementById('signPicker');
  p.innerHTML = '';
  signs.forEach(s => {
    const b = document.createElement('button');
    b.className = 'sign-btn' + (s.name === selectedSign ? ' active' : '');
    b.textContent = s.sym + ' ' + s.name;
    b.onclick = () => { selectedSign = s.name; localStorage.setItem('dmSign', s.name); buildPicker(); render(); };
    p.appendChild(b);
  });
}

function render() {
  const d = new Date(today); d.setDate(d.getDate() + offset);
  const day = getDayOfYear(d);
  const sign = signs.find(s => s.name === selectedSign);
  const texts = horoscopes[selectedSign];
  const idx = ((day - 1) % texts.length + texts.length) % texts.length;
  const seed = day * 31 + signs.findIndex(s => s.name === selectedSign) * 7;
  const luckySeed = Math.floor(seededRand(seed) * 99) + 1;
  const energyIdx = Math.floor(seededRand(seed + 1) * energies.length);
  const focusIdx = Math.floor(seededRand(seed + 2) * focusAreas.length);

  document.getElementById('dateLabel').textContent = formatDate(d);
  document.getElementById('signSymbol').textContent = sign.sym;
  document.getElementById('signName').textContent = sign.name + ' ' + sign.dates;
  document.getElementById('horoscopeText').textContent = texts[idx];
  document.getElementById('luckyNum').textContent = luckySeed;
  document.getElementById('energy').textContent = energies[energyIdx];
  document.getElementById('focus').textContent = focusAreas[focusIdx];
