function getDayOfYear(date) {
  const start = new Date(date.getFullYear(), 0, 0);
  return Math.floor((date - start) / 86400000);
}
function formatDate(date) {
  return date.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
}

const today = new Date(); today.setHours(0,0,0,0);
let offset = 0;

function render() {
  const d = new Date(today); d.setDate(d.getDate() + offset);
  const day = getDayOfYear(d);
  const idx = ((day - 1) % words.length + words.length) % words.length;
  const item = words[idx];
  document.getElementById('dateLabel').textContent = formatDate(d);
  document.getElementById('word').textContent = item.w;
  document.getElementById('pos').textContent = item.pos;
  document.getElementById('pronunciation').textContent = item.pr;
  document.getElementById('definition').textContent = item.d;
  document.getElementById('example').textContent = item.e;
  document.getElementById('prevBtn').disabled = offset <= -30;
  document.getElementById('nextBtn').disabled = offset >= 0;
  const w = document.getElementById('contentWrap');
  w.style.animation = 'none'; w.offsetHeight; w.style.animation = '';
}

function changeDay(dir) { offset += dir; render(); }
render();
